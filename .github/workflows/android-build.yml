name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platform & build-tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # debug.keystore is now committed to the repo (see .gitignore), so
      # every CI build shares the same signing certificate. This lets
      # freshly built APKs update an already-installed one instead of
      # hitting Android's "package conflicts with an existing package"
      # error, which happens when signatures differ between installs.
      - name: Verify debug keystore is present
        run: test -f debug.keystore

      # The Secrets Gradle Plugin falls back to .env.example when .env is
      # absent, so the build succeeds without a real Gemini key. If you've
      # added a GEMINI_API_KEY secret to the repo, it's written to .env so
      # it gets baked into this build instead.
      - name: Write .env
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinelog-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
